    }
    <span class="text-xl font-semibold">Trouvé</span>
    <span class="flex-1"></span>

    <button mat-icon-button>
      <mat-icon>notifications</mat-icon>
    </button>
    <button mat-icon-button>

  </mat-toolbar>
